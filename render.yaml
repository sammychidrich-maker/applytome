services:
  - type: web
    name: applytome
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: applytome-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health

  - type: pserv
    name: applytome-db
    env: docker
    plan: free
    image: postgres:15-alpine
    dockerCommand: ""
    envVars:
      - key: POSTGRES_USER
        value: applytome
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: applytome
