services:
  - type: web
    name: applytome
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: applytome-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health

  - type: postgres
    name: applytome-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
